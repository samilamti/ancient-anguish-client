name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive Windows build
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "ancient-anguish-client-windows-x64-$version.zip" -Force
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ancient-anguish-client-windows-x64-*.zip

      - name: Download VC++ Redistributable
        run: Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "build/vc_redist.x64.exe"
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Build Windows Installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$version" "installers\windows\installer.iss"
        shell: pwsh

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-release
          path: releases/ancient-anguish-client-windows-x64-setup-*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: macos/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS release
        run: flutter build macos --release

      - name: Archive .app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y "ancient-anguish-client-macos-${{ github.ref_name }}.zip" ancient_anguish_client.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/ancient-anguish-client-macos-*.zip

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R "build/macos/Build/Products/Release/ancient_anguish_client.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Ancient Anguish Client" \
            -srcfolder dmg-staging -ov -format UDZO \
            "ancient-anguish-client-macos-${{ github.ref_name }}.dmg"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-release
          path: ancient-anguish-client-macos-*.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle.kts', 'android/app/build.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Reduce Gradle memory for CI
        run: |
          sed -i 's/-Xmx8G/-Xmx4G/g' android/gradle.properties
          sed -i 's/MaxMetaspaceSize=4G/MaxMetaspaceSize=2G/g' android/gradle.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Rename artifacts with version
        run: |
          VERSION="${{ github.ref_name }}"
          cp build/app/outputs/flutter-apk/app-release.apk "ancient-anguish-client-android-${VERSION}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "ancient-anguish-client-android-${VERSION}.aab"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: ancient-anguish-client-android-*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-release
          path: ancient-anguish-client-android-*.aab

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libasound2-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux release
        run: flutter build linux --release

      - name: Archive Linux build
        run: tar -czf "ancient-anguish-client-linux-x64-${{ github.ref_name }}.tar.gz" -C build/linux/x64/release bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: ancient-anguish-client-linux-x64-*.tar.gz

      - name: Build .deb package
        run: |
          chmod +x installers/linux/build-deb.sh
          ./installers/linux/build-deb.sh "${{ github.ref_name }}"

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-release
          path: ancient-anguish-client-linux-x64-*.deb

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-ios-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-ios-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS release (unsigned)
        run: flutter build ios --release --no-codesign

  create-release:
    needs: [build-windows, build-macos, build-android, build-linux, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-assets/*
