name: ancient_anguish_client
description: "A cross-platform MUD client for Ancient Anguish with RPG theming and area-based audio."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.1.0

  # Audio
  just_audio: ^0.10.5
  just_audio_windows: ^0.2.2
  audio_session: ^0.2.2

  # Storage
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.3.4

  # File picker
  file_picker: ^10.3.10

  # Utilities
  path_provider: ^2.1.5
  collection: ^1.19.1
  json_annotation: ^4.9.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3

  # Code generation
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.0+1
  json_serializable: ^6.9.4
  hive_ce_generator: ^1.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/JetBrainsMono-Italic.ttf
          style: italic
